<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#c9a84c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Edit My Card</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07070b;
      --gold:        #c9a84c;
      --gold-light:  #e8c56a;
      --gold-dim:    rgba(201,168,76,0.12);
      --gold-glow:   rgba(201,168,76,0.3);
      --surface:     rgba(255,255,255,0.04);
      --surface-hi:  rgba(255,255,255,0.065);
      --border:      rgba(255,255,255,0.08);
      --border-gold: rgba(201,168,76,0.22);
      --text:        #f0ede8;
      --text-sub:    rgba(240,237,232,0.55);
      --text-muted:  rgba(240,237,232,0.28);
      --green:       #22c55e;
      --red:         #ef4444;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 80%, rgba(0,160,210,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7,7,11,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 14px 18px;
      gap: 12px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover { color: var(--gold); }
    .back-btn svg { width: 15px; height: 15px; stroke: currentColor; }

    .header-title {
      flex: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 0.03em;
    }

    .btn-preview-link {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--gold);
      text-decoration: none;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn-preview-link:hover { opacity: 0.75; }
    .btn-preview-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 20px 16px 40px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Live Preview Card ── */
    .preview-wrap {
      background: linear-gradient(140deg, rgba(201,168,76,0.3) 0%, rgba(201,168,76,0.06) 40%, rgba(0,160,210,0.1) 100%);
      padding: 1px;
      border-radius: 18px;
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .preview-card {
      background: rgba(11,10,17,0.95);
      border-radius: 17px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .prev-avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      padding: 2px;
      flex-shrink: 0;
    }

    .prev-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1a1620;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
    }
    .prev-avatar-inner img { width: 100%; height: 100%; object-fit: cover; }

    .prev-info { flex: 1; min-width: 0; }

    .prev-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .prev-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 2px;
    }

    .prev-company {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-align: center;
      margin-top: -10px;
      margin-bottom: -5px;
    }

    /* ── Form Sections ── */
    .form-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: fadeIn 0.5s ease both;
    }
    .form-section:nth-child(2) { animation-delay: 0.06s; }
    .form-section:nth-child(3) { animation-delay: 0.12s; }
    .form-section:nth-child(4) { animation-delay: 0.18s; }
    .form-section:nth-child(5) { animation-delay: 0.24s; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .section-icon svg { width: 15px; height: 15px; stroke: var(--gold); fill: none; }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
    }

    /* ── Field ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 13px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    input:focus, textarea:focus {
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
      background: rgba(255,255,255,0.06);
    }
    textarea { resize: none; height: 64px; line-height: 1.5; }

    input[type="url"] { font-size: 13px; }

    .field-hint {
      font-size: 10.5px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Action Buttons ── */
    .form-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeIn 0.5s ease 0.3s both;
    }

    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: linear-gradient(100deg, #b8932e 0%, #e8c56a 45%, #c9a84c 100%);
      color: #080606;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 22px rgba(201,168,76,0.35);
    }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(201,168,76,0.5); }
    .btn-save:active { transform: translateY(0); }
    .btn-save svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }

    .btn-row { display: flex; gap: 10px; }

    .btn-outline {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 16px;
      background: var(--surface);
      color: var(--text-sub);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-outline:hover { background: var(--surface-hi); border-color: rgba(255,255,255,0.14); color: var(--text); }
    .btn-outline.danger { color: rgba(239,68,68,0.7); border-color: rgba(239,68,68,0.2); }
    .btn-outline.danger:hover { color: var(--red); border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.05); }
    .btn-outline svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30,28,38,0.96);
      border: 1px solid var(--border-gold);
      color: var(--text);
      font-size: 13.5px;
      font-weight: 500;
      padding: 12px 22px;
      border-radius: 50px;
      backdrop-filter: blur(16px);
      z-index: 999;
      transition: transform 0.35s cubic-bezier(0.23,1,0.32,1);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success .toast-icon { color: var(--green); }
    .toast.error   .toast-icon { color: var(--red); }
    .toast-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15.75 19.5L8.25 12l7.5-7.5"/>
      </svg>
      Home
    </a>
    <div class="header-title">Edit My Card</div>
    <a href="card.html" class="btn-preview-link">
      Preview
      <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
      </svg>
    </a>
  </header>

  <!-- Main -->
  <main>

    <!-- Live Preview -->
    <div class="preview-label">Live Preview</div>
    <div class="preview-wrap">
      <div class="preview-card">
        <div class="prev-avatar">
          <div class="prev-avatar-inner" id="prev-avatar">AM</div>
        </div>
        <div class="prev-info">
          <div class="prev-name" id="prev-name">Alex Morgan</div>
          <div class="prev-title" id="prev-title">Senior Product Designer</div>
          <div class="prev-company" id="prev-company">Nexus Studio</div>
        </div>
      </div>
    </div>

    <!-- Personal Info -->
    <div class="form-section">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
        </div>
        <div class="section-title">Personal Info</div>
      </div>

      <div class="field">
        <label for="f-name">Full Name *</label>
        <input id="f-name" name="name" type="text" placeholder="Alex Morgan" autocomplete="name" required>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="f-title">Title / Role</label>
          <input id="f-title" type="text" placeholder="Product Designer">
        </div>
        <div class="field">
          <label for="f-company">Company</label>
          <input id="f-company" type="text" placeholder="Nexus Studio">
        </div>
      </div>

      <div class="field">
        <label for="f-tagline">Tagline</label>
        <textarea id="f-tagline" placeholder="Crafting digital experiences that inspire…"></textarea>
      </div>
    </div>

    <!-- Contact -->
    <div class="form-section">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
          </svg>
        </div>
        <div class="section-title">Contact</div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="f-phone">Phone</label>
          <input id="f-phone" type="tel" placeholder="+1 555 234-5678" autocomplete="tel">
        </div>
        <div class="field">
          <label for="f-email">Email</label>
          <input id="f-email" type="email" placeholder="alex@company.io" autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label for="f-website">Website</label>
        <input id="f-website" type="url" placeholder="https://yoursite.com">
      </div>

      <div class="field">
        <label for="f-location">Location</label>
        <input id="f-location" type="text" placeholder="San Francisco, CA" autocomplete="address-level2">
      </div>
    </div>

    <!-- Social Links -->
    <div class="form-section">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z"/>
          </svg>
        </div>
        <div class="section-title">Social Links</div>
      </div>
      <div class="field-hint">Paste the full URL. Leave blank to hide.</div>

      <div class="field">
        <label for="f-linkedin">LinkedIn</label>
        <input id="f-linkedin" type="url" placeholder="https://linkedin.com/in/yourname">
      </div>
      <div class="field">
        <label for="f-twitter">Twitter / X</label>
        <input id="f-twitter" type="url" placeholder="https://twitter.com/yourhandle">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="f-github">GitHub</label>
          <input id="f-github" type="url" placeholder="https://github.com/you">
        </div>
        <div class="field">
          <label for="f-instagram">Instagram</label>
          <input id="f-instagram" type="url" placeholder="https://instagram.com/you">
        </div>
      </div>
    </div>

    <!-- Appearance -->
    <div class="form-section">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
          </svg>
        </div>
        <div class="section-title">Profile Photo</div>
      </div>
      <div class="field">
        <label for="f-avatar">Photo URL</label>
        <input id="f-avatar" type="url" placeholder="https://example.com/your-photo.jpg">
        <div class="field-hint">Leave blank to use your initials instead.</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button class="btn-save" onclick="saveCard()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4z"/><path d="M17 3v4H7V3M12 12v6m-3-3h6"/>
        </svg>
        Save Changes
      </button>

      <div class="btn-row">
        <a href="card.html" class="btn-outline">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          Preview Card
        </a>
        <button class="btn-outline danger" onclick="resetCard()">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
          </svg>
          Reset
        </button>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toast-icon">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.5 12.75l6 6 9-13.5"/>
      </svg>
    </span>
    <span id="toast-msg">Saved!</span>
  </div>

  <script>
    /* ─── FIELD MAP ─── */
    const FIELDS = ['name','title','company','tagline','phone','email','website','location','linkedin','twitter','github','instagram','avatar'];

    /* ─── Load form from localStorage or config.js defaults ─── */
    function loadForm() {
      const saved = localStorage.getItem('nfc_card_data');
      const data  = saved ? JSON.parse(saved) : CARD_CONFIG;
      FIELDS.forEach(key => {
        const el = document.getElementById('f-' + key);
        if (el) el.value = data[key] || '';
      });
      updatePreview();
    }

    /* ─── Get current form values ─── */
    function getFormData() {
      const data = {};
      FIELDS.forEach(key => {
        const val = (document.getElementById('f-' + key)?.value || '').trim();
        data[key]  = val || null;
      });
      // Always compute cardUrl fresh from current origin
      data.cardUrl = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'card.html';
      return data;
    }

    /* ─── Live Preview ─── */
    function updatePreview() {
      const d       = getFormData();
      const name    = d.name    || 'Your Name';
      const initials = name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();

      const avatarEl = document.getElementById('prev-avatar');
      if (d.avatar) {
        avatarEl.innerHTML = `<img src="${d.avatar}" alt="${name}" onerror="this.parentElement.textContent='${initials}'">`;
      } else {
        avatarEl.textContent = initials;
      }

      document.getElementById('prev-name').textContent    = name;
      document.getElementById('prev-title').textContent   = d.title   || '';
      document.getElementById('prev-company').textContent = d.company || '';
    }

    /* ─── Save ─── */
    function saveCard() {
      const data = getFormData();
      if (!data.name) {
        showToast('Please enter your name.', 'error'); return;
      }
      localStorage.setItem('nfc_card_data', JSON.stringify(data));
      showToast('Card saved! Changes are live.', 'success');
    }

    /* ─── Reset ─── */
    function resetCard() {
      if (!confirm('Reset all fields back to the config.js defaults?')) return;
      localStorage.removeItem('nfc_card_data');
      loadForm();
      showToast('Reset to defaults.', 'success');
    }

    /* ─── Toast ─── */
    let toastTimer;
    function showToast(msg, type = 'success') {
      clearTimeout(toastTimer);
      const toast   = document.getElementById('toast');
      const iconEl  = document.getElementById('toast-icon');
      const msgEl   = document.getElementById('toast-msg');

      toast.className   = `toast ${type}`;
      msgEl.textContent = msg;
      iconEl.innerHTML  = type === 'success'
        ? `<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.75l6 6 9-13.5"/></svg>`
        : `<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>`;

      requestAnimationFrame(() => {
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
      });
    }

    /* ─── Live update on input ─── */
    document.querySelectorAll('input, textarea').forEach(el => {
      el.addEventListener('input', updatePreview);
    });

    /* ─── Save on Enter (for single-line inputs) ─── */
    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); saveCard(); } });
    });

    /* ─── Init ─── */
    loadForm();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
