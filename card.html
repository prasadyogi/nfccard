<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#c9a84c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title id="page-title">Digital Business Card</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #07070b;
      --gold:          #c9a84c;
      --gold-light:    #e8c56a;
      --gold-dim:      rgba(201,168,76,0.12);
      --gold-glow:     rgba(201,168,76,0.35);
      --surface:       rgba(255,255,255,0.035);
      --surface-hover: rgba(255,255,255,0.065);
      --border:        rgba(201,168,76,0.12);
      --border-str:    rgba(201,168,76,0.28);
      --text:          #f0ede8;
      --text-sub:      rgba(240,237,232,0.55);
      --text-muted:    rgba(240,237,232,0.28);
      --radius:        24px;
    }

    html {
      height: 100%;
      width: 100%;
      overflow-x: hidden; /* moved here — keeps body full-width */
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 36px;
    }

    /* Ambient glow — centered on desktop, corner on mobile */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 45%, rgba(201,168,76,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 35% at 10% 10%, rgba(201,168,76,0.04) 0%, transparent 50%),
        radial-gradient(ellipse 40% 35% at 90% 90%, rgba(0,160,210,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Desktop background mesh lines (subtle) ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
    }
    @media (min-width: 768px) { body::after { opacity: 1; } }

    /* ── Card Wrapper — gradient border ── */
    .card-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 0 auto; /* belt-and-suspenders centering */
      background: linear-gradient(
        140deg,
        rgba(201,168,76,0.4)  0%,
        rgba(201,168,76,0.08) 35%,
        rgba(0,160,210,0.14)  70%,
        rgba(201,168,76,0.3)  100%
      );
      padding: 1px;
      border-radius: var(--radius);
      animation: cardEntrance 0.85s cubic-bezier(0.23,1,0.32,1) both;
    }

    @keyframes cardEntrance {
      0%   { transform: perspective(1100px) rotateY(-55deg) translateX(-20px) scale(0.94); opacity: 0; }
      60%  { transform: perspective(1100px) rotateY(4deg)   translateX(3px)   scale(1.005); opacity: 1; }
      100% { transform: perspective(1100px) rotateY(0deg)   translateX(0)     scale(1);    opacity: 1; }
    }

    .card {
      background: rgba(11,10,17,0.93);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: calc(var(--radius) - 1px);
      overflow: hidden;
    }

    /* Gold accent stripe at top */
    .card-accent {
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold) 25%, var(--gold-light) 50%, var(--gold) 75%, transparent);
    }

    .card-body {
      padding: 30px 26px 26px;
    }

    /* ── Profile Section ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 26px;
    }

    .avatar-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a84c, #f0c96e, #c9a84c);
      padding: 2.5px;
      margin-bottom: 15px;
      animation: avatarPulse 3.5s ease-in-out infinite alternate;
      flex-shrink: 0;
    }

    @keyframes avatarPulse {
      from { box-shadow: 0 0 12px rgba(201,168,76,0.3); }
      to   { box-shadow: 0 0 32px rgba(201,168,76,0.55); }
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #19161f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -1px;
    }

    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 27px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .title {
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.13em;
      margin-bottom: 3px;
    }

    .company {
      font-size: 13.5px;
      font-weight: 400;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-str), transparent);
      margin: 20px 0;
    }

    /* ── Contact List ── */
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 9px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      color: inherit;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }
    .contact-item:hover { background: var(--surface-hover); }
    .contact-item:nth-child(1) { animation-delay: 0.55s; }
    .contact-item:nth-child(2) { animation-delay: 0.68s; }
    .contact-item:nth-child(3) { animation-delay: 0.81s; }
    .contact-item:nth-child(4) { animation-delay: 0.94s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ci-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ci-icon svg { width: 17px; height: 17px; stroke: var(--gold); }

    .ci-info { flex: 1; min-width: 0; }
    .ci-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 1px;
    }
    .ci-value {
      font-size: 13.5px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ci-chevron { color: var(--text-muted); flex-shrink: 0; }

    /* ── Social Row ── */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.4s ease 1.08s forwards;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.22s ease;
      text-decoration: none;
      color: var(--text-sub);
    }
    .social-btn:hover {
      background: var(--gold-dim);
      border-color: var(--border-str);
      color: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }
    .social-btn svg { width: 17px; height: 17px; fill: currentColor; }

    /* ── Actions ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.4s ease 1.22s forwards;
    }

    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: linear-gradient(100deg, #b8932e 0%, #e8c56a 45%, #c9a84c 100%);
      background-size: 200% 100%;
      background-position: 0% 0%;
      color: #080606;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 22px rgba(201,168,76,0.38), 0 2px 8px rgba(0,0,0,0.3);
    }
    .btn-save:hover {
      background-position: 100% 0%;
      box-shadow: 0 6px 32px rgba(201,168,76,0.58), 0 4px 16px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }
    .btn-save:active { transform: translateY(0); }
    .btn-save svg { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 24px;
      background: var(--surface);
      color: var(--text-sub);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.22s ease;
    }
    .btn-secondary:hover {
      background: var(--surface-hover);
      border-color: var(--border-str);
      color: var(--text);
    }
    .btn-secondary svg { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; }

    /* ── Share / NFC button ── */
    .btn-nfc-share {
      display: none; /* shown via JS only when Web Share is available */
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 24px;
      background: linear-gradient(120deg, rgba(0,180,220,0.18) 0%, rgba(0,212,255,0.08) 100%);
      color: #00d4ff;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid rgba(0,212,255,0.35);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-nfc-share::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(0,212,255,0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-nfc-share:hover {
      border-color: rgba(0,212,255,0.6);
      box-shadow: 0 0 22px rgba(0,212,255,0.25), 0 4px 16px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }
    .btn-nfc-share:hover::before { opacity: 1; }
    .btn-nfc-share:active { transform: translateY(0); }
    .btn-nfc-share svg { width: 16px; height: 16px; flex-shrink: 0; }
    /* Heartbeat pulse on the NFC icon */
    .btn-nfc-share .nfc-pulse {
      display: inline-flex;
      animation: btnNfcPulse 1.8s ease-in-out infinite;
    }
    @keyframes btnNfcPulse {
      0%,100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.22); opacity: 0.75; }
    }

    /* ── QR Section ── */
    .qr-section {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.42s cubic-bezier(0.23,1,0.32,1);
    }
    .qr-section.open { max-height: 300px; }

    .qr-inner {
      padding-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    #qrcode {
      background: white;
      padding: 10px;
      border-radius: 10px;
      display: inline-block;
      line-height: 0;
    }
    #qrcode canvas, #qrcode img { display: block; }
    .qr-url {
      font-size: 10.5px;
      color: var(--text-muted);
      word-break: break-all;
      text-align: center;
      max-width: 240px;
    }

    /* ── Footer ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 12px 26px;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.4s ease 1.38s forwards;
    }
    .nfc-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.75); }
    }
    .footer-text { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; }

    /* ── Write Link ── */
    .write-link {
      margin-top: 18px;
      font-size: 11.5px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      z-index: 1;
      letter-spacing: 0.04em;
    }
    .write-link:hover { color: var(--gold); }

    /* ══════════════════════════════════════════
       DESKTOP LAYOUT  ≥ 960px
    ══════════════════════════════════════════ */

    /* Page layout: card + sidebar side-by-side */
    .page-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 420px;
      z-index: 1;
    }

    /* Desktop sidebar (hidden on mobile) */
    .dp-sidebar {
      display: none;
    }

    /* Mobile bottom links */
    .mobile-links {
      display: flex;
      gap: 20px;
      z-index: 1;
      margin-top: 6px;
    }

    @media (min-width: 960px) {
      body {
        padding: 32px 40px;
      }

      .page-layout {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 40px;
        max-width: 900px;
      }

      /* Card gets a bit more room */
      .card-wrapper {
        max-width: 440px;
        flex-shrink: 0;
      }

      /* Desktop sidebar becomes visible */
      .dp-sidebar {
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 260px;
        flex-shrink: 0;
        animation: fadeUp 0.5s ease 0.4s both;
      }

      .mobile-links { display: none; }
      .dp-hide-on-desktop { display: none !important; }

      /* On desktop the QR section can auto-open */
      .qr-section { max-height: none !important; }
    }

    /* ── Desktop Sidebar Styles ── */
    .dp-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .dp-qr-box {
      background: linear-gradient(140deg, rgba(201,168,76,0.15) 0%, rgba(201,168,76,0.04) 100%);
      border: 1px solid var(--border-str);
      border-radius: 18px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .dp-qr-wrap {
      background: white;
      padding: 10px;
      border-radius: 10px;
      line-height: 0;
    }

    .dp-qr-hint {
      font-size: 11.5px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    .dp-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dp-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 15px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-sub);
    }
    .dp-btn:hover {
      background: var(--surface-hover);
      border-color: rgba(255,255,255,0.14);
      color: var(--text);
      transform: translateX(3px);
    }
    .dp-btn.gold {
      background: rgba(201,168,76,0.08);
      border-color: rgba(201,168,76,0.22);
      color: var(--gold-light);
    }
    .dp-btn.gold:hover {
      background: rgba(201,168,76,0.14);
      border-color: rgba(201,168,76,0.38);
    }
    .dp-btn svg { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; }

    .dp-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-str), transparent);
    }

    .dp-name-area {
      padding: 4px 0;
    }
    .dp-big-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 3px;
    }
    .dp-sub {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <!-- Page layout: on desktop becomes a row (card + sidebar) -->
  <div class="page-layout">

  <!-- ── Card ── -->
  <div class="card-wrapper">
    <div class="card">
      <div class="card-accent"></div>
      <div class="card-body">

        <!-- Profile -->
        <div class="profile">
          <div class="avatar-ring">
            <div class="avatar-inner" id="avatar-inner"></div>
          </div>
          <h1 class="name" id="card-name"></h1>
          <div class="title" id="card-title"></div>
          <div class="company" id="card-company"></div>
          <div class="tagline" id="card-tagline"></div>
        </div>

        <div class="divider"></div>

        <!-- Contact List -->
        <div class="contact-list" id="contact-list"></div>

        <!-- Social Row (injected if socials exist) -->
        <div id="social-section"></div>

        <div class="divider"></div>
        <!-- card changes -->
        <!-- Actions -->
        <div class="actions">
          <!-- Save to Contacts -->
          <button class="btn-save" onclick="downloadVCard()">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 16l-4-4h3V4h2v8h3l-4 4z"/><path d="M20 18H4v2h16v-2z"/>
            </svg>
            Save to Contacts
          </button>

          <!-- Share via NFC / Nearby — shown when Web Share API available -->
          <button class="btn-nfc-share" id="btn-nfc-share" onclick="shareViaNFC()">
            <span class="nfc-pulse">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="2.5" fill="#00d4ff"/>
                <path d="M8.2 12a3.8 3.8 0 0 1 7.6 0" stroke="#00d4ff" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M4.8 12a7.2 7.2 0 0 1 14.4 0" stroke="#00d4ff" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
                <path d="M1.5 12A10.5 10.5 0 0 1 22.5 12" stroke="#00d4ff" stroke-width="1.6" stroke-linecap="round" opacity="0.28"/>
              </svg>
            </span>
            Share via NFC / Nearby
          </button>

          <!-- QR Code toggle (mobile) — hidden on desktop since sidebar shows it -->
          <button class="btn-secondary dp-hide-on-desktop" id="btn-qr" onclick="toggleQR()">
            <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="4.5" y="4.5" width="4" height="4" fill="currentColor" rx="0.5" stroke="none"/>
              <rect x="15.5" y="4.5" width="4" height="4" fill="currentColor" rx="0.5" stroke="none"/>
              <rect x="4.5" y="15.5" width="4" height="4" fill="currentColor" rx="0.5" stroke="none"/>
              <path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20h3"/>
            </svg>
            <span id="btn-qr-label">Show QR Code</span>
          </button>

          <div class="qr-section" id="qr-section">
            <div class="qr-inner">
              <div class="qr-label">Scan to open this card</div>
              <div id="qrcode"></div>
              <div class="qr-url" id="qr-url-text"></div>
            </div>
          </div>
        </div>

      </div>

      <div class="card-footer">
        <div class="nfc-dot"></div>
        <span class="footer-text">NFC Digital Business Card</span>
      </div>
    </div>
  </div>

  <!-- ── Desktop Sidebar (hidden on mobile via CSS) ── -->
  <div class="dp-sidebar">

    <!-- Name / title recap -->
    <div class="dp-name-area">
      <div class="dp-big-name" id="dp-name"></div>
      <div class="dp-sub" id="dp-sub"></div>
    </div>

    <div class="dp-divider"></div>

    <!-- Always-visible QR code -->
    <div class="dp-qr-box">
      <div class="dp-label">Scan to open card</div>
      <div class="dp-qr-wrap" id="dp-qrcode"></div>
      <div class="dp-qr-hint">Point camera here — no app needed</div>
    </div>

    <!-- Quick actions -->
    <div class="dp-actions">
      <button class="dp-btn gold" onclick="downloadVCard()">
        <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
        </svg>
        Save Contact (.vcf)
      </button>
      <a href="write.html" class="dp-btn">
        <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/>
          <path d="M9.5 12a2.5 2.5 0 015 0M7 12a5 5 0 0110 0M4.5 12a7.5 7.5 0 0115 0"/>
        </svg>
        Share &amp; NFC
      </a>
      <a href="edit.html" class="dp-btn">
        <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/>
        </svg>
        Edit My Card
      </a>
    </div>

  </div>

  </div><!-- end .page-layout -->

  <!-- Mobile-only bottom links -->
  <div class="mobile-links">
    <a href="write.html" class="write-link">Share &amp; NFC</a>
    <a href="edit.html"  class="write-link">Edit Card</a>
  </div>

  <script>
    /* ──────────────────────────────────────────────────────────────────
       INLINE SVG ICONS
    ────────────────────────────────────────────────────────────────── */
    const ICONS = {
      phone: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>`,
      email: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>`,
      globe: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8M3.6 15h16.8M12 3a15 15 0 010 18M12 3a15 15 0 000 18"/></svg>`,
      pin:   `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>`,
    };

    const SOCIAL_ICONS = {
      linkedin:  `<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
      twitter:   `<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
      github:    `<svg viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>`,
      instagram: `<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`,
    };

    /* ──────────────────────────────────────────────────────────────────
       POPULATE CARD
       Priority: localStorage (edited by user) → config.js (defaults)
    ────────────────────────────────────────────────────────────────── */
    const _saved = localStorage.getItem('nfc_card_data');
    const c = _saved ? JSON.parse(_saved) : CARD_CONFIG;
    if (!c.cardUrl) {
      c.cardUrl = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'card.html';
    }

    // Page title
    document.getElementById('page-title').textContent = `${c.name} — ${c.title}`;

    // Avatar
    const avatarEl = document.getElementById('avatar-inner');
    if (c.avatar) {
      avatarEl.innerHTML = `<img src="${c.avatar}" alt="${c.name}" onerror="this.parentElement.textContent='${c.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}'">`;
    } else {
      avatarEl.textContent = c.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    }

    document.getElementById('card-name').textContent    = c.name;
    document.getElementById('card-title').textContent   = c.title;
    document.getElementById('card-company').textContent = c.company;
    if (c.tagline) document.getElementById('card-tagline').textContent = c.tagline;

    // Desktop sidebar
    document.getElementById('dp-name').textContent = c.name;
    document.getElementById('dp-sub').textContent  = `${c.title}${c.company ? ' · ' + c.company : ''}`;
    // Desktop QR (generate only on desktop viewport to save resources)
    if (window.matchMedia('(min-width: 960px)').matches) {
      new QRCode(document.getElementById('dp-qrcode'), {
        text: c.cardUrl, width: 150, height: 150,
        colorDark: '#08060a', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    }

    // Contact items
    const contacts = [
      c.phone    && { label: 'Phone',    value: c.phone,                              href: `tel:${c.phone}`,                                  icon: 'phone' },
      c.email    && { label: 'Email',    value: c.email,                              href: `mailto:${c.email}`,                               icon: 'email' },
      c.website  && { label: 'Website',  value: c.website.replace(/^https?:\/\//,''), href: c.website,                                         icon: 'globe', ext: true },
      c.location && { label: 'Location', value: c.location,                           href: `https://maps.google.com/?q=${encodeURIComponent(c.location)}`, icon: 'pin', ext: true },
    ].filter(Boolean);

    const chevron = `<svg class="ci-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>`;

    const contactList = document.getElementById('contact-list');
    contacts.forEach(item => {
      const a = document.createElement('a');
      a.className = 'contact-item';
      a.href   = item.href;
      a.target = item.ext ? '_blank' : '_self';
      a.rel    = 'noopener noreferrer';
      a.innerHTML = `
        <div class="ci-icon">${ICONS[item.icon]}</div>
        <div class="ci-info">
          <div class="ci-label">${item.label}</div>
          <div class="ci-value">${item.value}</div>
        </div>
        ${chevron}`;
      contactList.appendChild(a);
    });

    // Social links
    const socials = [
      c.linkedin  && { url: c.linkedin,  icon: 'linkedin',  label: 'LinkedIn'  },
      c.twitter   && { url: c.twitter,   icon: 'twitter',   label: 'Twitter'   },
      c.github    && { url: c.github,    icon: 'github',    label: 'GitHub'    },
      c.instagram && { url: c.instagram, icon: 'instagram', label: 'Instagram' },
    ].filter(Boolean);

    const socialSection = document.getElementById('social-section');
    if (socials.length > 0) {
      const div = document.createElement('div');
      div.innerHTML = '<div class="divider"></div>';
      const row = document.createElement('div');
      row.className = 'social-row';
      socials.forEach(s => {
        const a = document.createElement('a');
        a.className = 'social-btn';
        a.href      = s.url;
        a.target    = '_blank';
        a.rel       = 'noopener noreferrer';
        a.title     = s.label;
        a.innerHTML = SOCIAL_ICONS[s.icon];
        row.appendChild(a);
      });
      div.appendChild(row);
      socialSection.appendChild(div);
    }

    // QR URL text
    document.getElementById('qr-url-text').textContent = c.cardUrl;

    /* ──────────────────────────────────────────────────────────────────
       QR CODE TOGGLE
    ────────────────────────────────────────────────────────────────── */
    let qrGenerated = false;

    function toggleQR() {
      const section  = document.getElementById('qr-section');
      const labelEl  = document.getElementById('btn-qr-label');
      const isOpen   = section.classList.toggle('open');

      if (labelEl) labelEl.textContent = isOpen ? 'Hide QR Code' : 'Show QR Code';

      if (isOpen && !qrGenerated) {
        qrGenerated = true;
        new QRCode(document.getElementById('qrcode'), {
          text:         c.cardUrl,
          width:        160,
          height:       160,
          colorDark:    '#08060a',
          colorLight:   '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      }
    }

    // Auto-open QR on mobile so user sees it immediately
    document.addEventListener('DOMContentLoaded', () => {
      if (!window.matchMedia('(min-width: 960px)').matches) {
        toggleQR();
      }
    });

    /* ──────────────────────────────────────────────────────────────────
       NFC / WEB SHARE
       On Android Chrome, the share sheet includes "Nearby Share" which
       uses NFC + Bluetooth to beam the URL to a nearby device.
    ────────────────────────────────────────────────────────────────── */
    if (navigator.share) {
      document.getElementById('btn-nfc-share').style.display = 'flex';
    }

    async function shareViaNFC() {
      try {
        await navigator.share({
          title: `${c.name} — ${c.title}`,
          text:  `${c.name} · ${c.title} at ${c.company}`,
          url:   c.cardUrl,
        });
      } catch (err) {
        if (err.name !== 'AbortError') {
          // Share sheet not available — fall back to clipboard copy
          try {
            await navigator.clipboard.writeText(c.cardUrl);
            const btn = document.getElementById('btn-nfc-share');
            const orig = btn.innerHTML;
            btn.textContent = 'Link copied!';
            setTimeout(() => { btn.innerHTML = orig; }, 2000);
          } catch (_) {}
        }
      }
    }

    /* ──────────────────────────────────────────────────────────────────
       vCARD DOWNLOAD
    ────────────────────────────────────────────────────────────────── */
    function downloadVCard() {
      const parts     = c.name.trim().split(' ');
      const firstName = parts[0];
      const lastName  = parts.slice(1).join(' ');

      const lines = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        `FN:${c.name}`,
        `N:${lastName};${firstName};;;`,
        c.title    ? `TITLE:${c.title}`                             : '',
        c.company  ? `ORG:${c.company}`                             : '',
        c.phone    ? `TEL;TYPE=CELL:${c.phone}`                     : '',
        c.email    ? `EMAIL;TYPE=INTERNET,PREF:${c.email}`          : '',
        c.website  ? `URL:${c.website}`                             : '',
        c.location ? `ADR;TYPE=WORK:;;${c.location};;;;`            : '',
        c.linkedin ? `X-SOCIALPROFILE;type=linkedin:${c.linkedin}`  : '',
        c.twitter  ? `X-SOCIALPROFILE;type=twitter:${c.twitter}`    : '',
        `NOTE:Digital Card: ${c.cardUrl}`,
        'END:VCARD',
      ].filter(Boolean).join('\r\n');

      const blob = new Blob([lines], { type: 'text/vcard;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `${c.name.replace(/\s+/g, '_')}.vcf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    /* ──────────────────────────────────────────────────────────────────
       SERVICE WORKER
    ────────────────────────────────────────────────────────────────── */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
