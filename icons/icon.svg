<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#07070b"/>

  <!-- Subtle glow -->
  <radialGradient id="glow" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Card shape -->
  <rect x="64" y="158" width="384" height="220" rx="28"
        fill="none" stroke="#c9a84c" stroke-width="14" stroke-opacity="0.9"/>

  <!-- Top accent line on card -->
  <line x1="64" y1="218" x2="448" y2="218" stroke="#c9a84c" stroke-width="10" stroke-opacity="0.4"/>

  <!-- Chip (left side) -->
  <rect x="96" y="240" width="70" height="52" rx="8"
        fill="none" stroke="#c9a84c" stroke-width="8" stroke-opacity="0.75"/>
  <line x1="96" y1="266" x2="166" y2="266" stroke="#c9a84c" stroke-width="5" stroke-opacity="0.45"/>
  <line x1="119" y1="240" x2="119" y2="292" stroke="#c9a84c" stroke-width="5" stroke-opacity="0.45"/>
  <line x1="143" y1="240" x2="143" y2="292" stroke="#c9a84c" stroke-width="5" stroke-opacity="0.45"/>

  <!-- NFC signal arcs (right side) -->
  <circle cx="320" cy="268" r="14" fill="#c9a84c"/>
  <path d="M290 268 a30 30 0 0 1 60 0"
        fill="none" stroke="#c9a84c" stroke-width="12" stroke-linecap="round" stroke-opacity="0.85"/>
  <path d="M260 268 a60 60 0 0 1 120 0"
        fill="none" stroke="#c9a84c" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M228 268 a92 92 0 0 1 184 0"
        fill="none" stroke="#c9a84c" stroke-width="8"  stroke-linecap="round" stroke-opacity="0.25"/>
</svg>
